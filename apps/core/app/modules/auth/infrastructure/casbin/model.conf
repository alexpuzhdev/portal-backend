# Casbin model: RBAC with domains.
# - sub  — user_id (UUID)
# - dom  — organization_id (UUID), бизнес-домен внутри инстанса
# - obj  — resource (например "invitations")
# - act  — action (например "create")
#
# Правила связывания пользователь → роль действуют в рамках домена
# (organization). Permission может быть либо общим (на любую
# организацию), либо привязанным к конкретной (через g2). На текущем
# этапе используем только g + p — глобальные permission на роль.
[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub, r.dom) && (p.dom == "*" || p.dom == r.dom) && r.obj == p.obj && r.act == p.act
