[project]
name = "canonical-models"
version = "0.1.0"
description = "Canonical Pydantic models — single source of truth for cross-service data"
requires-python = ">=3.12,<3.14"
dependencies = ["pydantic>=2.9.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["canonical_models"]

[tool.mypy]
python_version = "3.12"
strict = true
disallow_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
plugins = ["pydantic.mypy"]
files = ["canonical_models"]
