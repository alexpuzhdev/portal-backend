[project]
name = "event-schemas"
version = "0.1.0"
description = "Pydantic schemas for events on the Portal RabbitMQ bus"
requires-python = ">=3.12,<3.14"
dependencies = ["pydantic>=2.9.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["event_schemas"]

[tool.mypy]
python_version = "3.12"
strict = true
disallow_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
plugins = ["pydantic.mypy"]
files = ["event_schemas"]
