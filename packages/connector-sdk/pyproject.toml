[project]
name = "connector-sdk"
version = "0.1.0"
description = "Base classes and helpers for Portal connectors"
requires-python = ">=3.12,<3.14"
dependencies = [
    "pydantic>=2.9.0",
    "httpx>=0.27.0",
    "structlog>=24.4.0",
    "canonical-models",
    "event-schemas",
]

[tool.uv.sources]
canonical-models = { workspace = true }
event-schemas = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["connector_sdk"]

[tool.mypy]
python_version = "3.12"
strict = true
disallow_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
plugins = ["pydantic.mypy"]
files = ["connector_sdk"]
