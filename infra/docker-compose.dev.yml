# Локальное окружение разработчика. Поднимает все необходимые зависимости
# и core с hot-reload. Прод-вариант (compose.yml) появится отдельно.
name: portal-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
      POSTGRES_DB: portal
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d portal"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    # Хост-порт сдвинут с 6379, чтобы не конфликтовать с типичным
    # системным Redis на машине разработчика. Внутри compose service
    # доступен по адресу `redis:6379`, host-маппинг нужен только для
    # отладки (redis-cli -p 16379).
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: portal
      RABBITMQ_DEFAULT_PASS: portal
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbit-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: portal
      MINIO_ROOT_PASSWORD: portalpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  core:
    build:
      context: ..
      dockerfile: apps/core/Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/workspace/apps/core/app"]
    environment:
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://portal:portal@postgres:5432/portal
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://portal:portal@rabbitmq:5672/
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: portal
      S3_SECRET_KEY: portalpassword
      S3_BUCKET: portal
    ports:
      - "8000:8000"
    volumes:
      - ../apps/core/app:/workspace/apps/core/app:ro
      - ../packages:/workspace/packages:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  rabbit-data:
  minio-data:
